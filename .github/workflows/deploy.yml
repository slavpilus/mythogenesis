name: Deploy to Hugging Face Space

# Runs only after CI succeeds on main, then uploads the repo to the HF Space via the
# huggingface_hub commit API (more resilient than git push, which rate-limits hard).
# Requires:
#   - secret HF_TOKEN  : a Hugging Face write token
#   - variable HF_SPACE_ID : the Space id, e.g. "username/mythogenesis"
# If either is unset the job exits cleanly without deploying.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

# Force JS actions onto Node 24 ahead of the 2026-06-16 default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: uv run --with "huggingface_hub>=1.0" python scripts/deploy_to_space.py
